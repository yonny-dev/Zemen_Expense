<!doctype html> <!-- Document type declaration for HTML5 -->
<html lang="en"> <!-- Root element with language set to English -->
  <head> <!-- Container for metadata and links to external resources -->
    <meta charset="UTF-8" /> <!-- Set character encoding to UTF-8 -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0" /> <!-- Configure viewport for responsive design -->
    <title>My Google AI Studio App</title> <!-- Title of the web page displayed in the browser tab -->
  </head> <!-- End of head section -->
  <body> <!-- Container for the visible content of the page -->
    <div id="root"></div> <!-- Root element where the React application will be mounted -->
    <script type="module" src="/src/main.tsx"></script> <!-- Main entry point for the React application script -->
  </body> <!-- End of body section -->
</html> <!-- End of html document -->
